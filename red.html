<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ainnnnn</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('dark.gif') no-repeat center center fixed; /* Adicione a imagem de fundo */
            background-size: cover; /* Garante que a imagem cubra toda a página */
            color: #fff; /* Branco */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            max-width: 800px;
            padding: 20px;
            text-align: justify;
            background-color: rgba(0, 0, 0, 0.7); /* Fundo semi-transparente para o texto */
            border-radius: 10px; /* Cantos arredondados */
        }

        h1 {
            color: #e63946; /* Vermelho sangue */
            text-align: center;
            margin-bottom: 20px;
        }

        p {
            line-height: 1.6;
            font-size: 18px;
        }

        button {
            background-color: #e63946; /* Vermelho sangue */
            color: #fff; /* Branco */
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            display: block; /* Transforma o botão em um elemento de bloco */
            margin: 20px auto 0; /* Margem automática nas laterais para centralizar */
        }

        button:hover {
            background-color: #c4313d; /* Vermelho mais escuro */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Olá Isabella, dentro do texto tem pista proxima pagina</h1>
    
        <p>
            Na trama do mistério, onde sombras e luz se entrelaçam, encontra-se um segredo guardado neste lugar.
        </p>
        <p>
            Portanto peese com calma, o autor deseja que não se incomode com que o aguarda, se tiver certeza clique em "Prosseguir"
        </p>
        <button onclick="window.location.href = 'final.html';">Prosseguir</button>
    </div>
</body>
</html>
